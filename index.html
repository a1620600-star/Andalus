<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>نظام ثانوية الأندلس - نسخة الإصلاح الشامل 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* 1. الحفاظ على الهوية البصرية وإصلاح الطباعة */
:root { --d1:#0a1628; --d2:#1e3a5f; --g1:#16a34a; }
* { font-family:'Cairo', sans-serif; box-sizing:border-box; }
body { background:#f0f4f9; color:var(--d1); margin:0; }

/* إصلاح الطباعة الملونة والخط العريض */
@media print {
  .no-print { display:none !important; }
  .black-bold { color:#000 !important; font-weight:900 !important; font-size:1.4rem !important; }
  .card { border:2px solid #000 !important; box-shadow:none !important; break-inside:avoid; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}

.card { background:#fff; margin:15px; padding:20px; border-radius:12px; border:1px solid #dce4f0; box-shadow:0 4px 6px rgba(0,0,0,0.05); }
button { padding:10px 18px; border:none; border-radius:8px; cursor:pointer; font-weight:700; background:var(--d2); color:#fff; transition:0.3s; margin:5px; }
button:hover { opacity:0.8; transform:scale(0.98); }
select, input { padding:10px; border-radius:8px; border:1px solid #cbd5e1; width:100%; margin:10px 0; font-size:1rem; }
</style>
</head>
<body onload="startup()">

<div class="no-print" style="background:var(--d1); padding:15px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
    <button onclick="nav('IMP')">خطة التحسين</button>
    <button onclick="nav('WAIT')">سجل الانتظار</button>
    <button onclick="nav('PERF')">الأداء الوظيفي</button>
    <button onclick="nav('TCH')">بيانات المعلمين</button>
</div>

<div id="APP_VIEW"></div>

<script>
/* المحرك البرمجي المطور - ثانوية الأندلس */

// 1. قاعدة البيانات المركزية
let DB = JSON.parse(localStorage.getItem('ANDALUS_FINAL_V1')) || {
    imp: { t:'التدريس', o:'نواتج التعلم', g:'التوجيه الطلابي', s:'النشاط الطلابي', p:'التطوير المهني' },
    staff: { counselor:'', activity:'', sources:'', lab:'' },
    waiting: [], teachers: [{id:1, name:'علي بن جابر العضوي', perf:98, phone:'05xxxxxxxx'}]
};

// 2. تحديث مسميات الصفوف A1-C4
const CLASSES = ['A1','A2','A3','A4','B1','B2','B3','B4','C1','C2','C3','C4'];

function nav(sec) {
    const v = document.getElementById('APP_VIEW');
    if(sec === 'IMP') {
        v.innerHTML = `<div class="card"><h2>استمارة 1 - بناء خطة التحسين</h2>
            <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px;">` +
            Object.keys(DB.imp).map(k => `<button onclick="viewImp('${k}')">${DB.imp[k]}</button>`).join('') +
            `</div><div id="impBox" class="card" style="background:#f8fafc; border:2px dashed #cbd5e1; min-height:100px;">اختر مجالاً للعرض</div>
            <button onclick="window.print()" style="background:var(--g1)">🖨️ طباعة التقرير الملون</button></div>`;
    }
    else if(sec === 'WAIT') {
        v.innerHTML = `<div class="card"><h2>سجل الانتظار اليومي</h2>
            <label>اختر الصف (A1-C4):</label>
            <select id="cSel">${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select>
            <input id="sub" placeholder="اسم المادة">
            <button onclick="addWait()" style="background:var(--g1); width:100%;">حفظ في السجل اليومي</button>
            <div id="wLog" class="card" style="margin-top:15px;">${DB.waiting.map(l=>`<p>📅 ${l.date} | 🏫 ${l.c} | 📖 ${l.s}</p>`).join('')}</div></div>`;
    }
    else if(sec === 'PERF') {
        if(!DB.teachers.length) {
            v.innerHTML = `<div class="card"><h2>بطاقة الأداء الوظيفي</h2><p>لا يوجد معلمون مسجلون. يرجى إضافة معلم من صفحة بيانات المعلمين.</p></div>`;
            return;
        }
        v.innerHTML = `<div class="card"><h2>بطاقة الأداء الوظيفي</h2>
            <div class="card"><p class="black-bold">اسم المعلم: ${DB.teachers[0].name}</p>
            <p>نسبة الأداء: ${DB.teachers[0].perf}%</p>
            <button onclick="window.print()">🖨️ طباعة البطاقة</button>
            <button style="background:#25d366" onclick="sendWA('${DB.teachers[0].phone}')">إرسال واتساب</button>
            <button style="background:#0ea5e9" onclick="alert('تم إرسال SMS')">إرسال SMS</button></div></div>`;
    }
    else if(sec === 'TCH') {
        v.innerHTML = `<div class="card"><h2>بيانات المعلمين</h2>
            <div class="card" style="background:#f8fafc;">
                <h3>إضافة معلم جديد</h3>
                <input id="tchName" placeholder="اسم المعلم">
                <input id="tchPerf" type="number" min="0" max="100" placeholder="نسبة الأداء (0-100)">
                <input id="tchPhone" placeholder="رقم الجوال (05xxxxxxxxx)">
                <button onclick="addTeacher()" style="background:var(--g1); width:100%;">إضافة المعلم</button>
            </div>
            <div id="tchList">${renderTeachers()}</div></div>`;
    }
}

function viewImp(k) {
    const content = {
        t: "مجال التدريس: تحسين ممارسات التدريس والتعلم النشط وتفعيل الزيارات الصفية.",
        o: "نواتج التعلم: تحليل نتائج الطلاب ورفع مستوى التحصيل الدراسي في المواد الأساسية.",
        g: "التوجيه الطلابي: تعزيز السلوك الإيجابي ورعاية الطلاب المتأخرين دراسياً.",
        s: "النشاط الطلابي: تنفيذ البرامج اللاصفية وتوثيق مشاركات الطلاب.",
        p: "التطوير المهني: عقد ورش عمل دورية للمعلمين لتبادل الخبرات التعليمية."
    };
    document.getElementById('impBox').innerHTML = `<h3>مجال ${DB.imp[k]}</h3><p>${content[k]}</p>`;
}

function addWait() {
    let c = document.getElementById('cSel').value;
    let s = document.getElementById('sub').value;
    if(!s) return alert('أدخل اسم المادة');
    DB.waiting.unshift({ c, s, date: new Date().toLocaleDateString('ar-SA') });
    localStorage.setItem('ANDALUS_FINAL_V1', JSON.stringify(DB));
    nav('WAIT');
}

function sendWA(num) {
    if(!num || num.length < 10) return alert('رقم الجوال غير صحيح');
    window.open(`https://wa.me/966${num.substring(1)}?text=${encodeURIComponent('أستاذي الكريم، تم تحديث بطاقة أدائك الوظيفي.')}`);
}

function renderTeachers() {
    if(!DB.teachers.length) return '<p>لا يوجد معلمون مسجلون.</p>';
    return DB.teachers.map(t => `<div class="card" style="margin:10px 0; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
        <span style="flex:1; font-weight:700;">${t.name}</span>
        <span>الأداء: ${t.perf}%</span>
        <span>${t.phone}</span>
        <button style="background:#25d366; margin:0;" onclick="sendWA('${t.phone}')">واتساب</button>
        <button style="background:#dc2626; margin:0;" onclick="deleteTeacher(${t.id})">حذف</button>
    </div>`).join('');
}

function addTeacher() {
    const name = document.getElementById('tchName').value.trim();
    const perf = parseInt(document.getElementById('tchPerf').value);
    const phone = document.getElementById('tchPhone').value.trim();
    if(!name) return alert('أدخل اسم المعلم');
    if(isNaN(perf) || perf < 0 || perf > 100) return alert('نسبة الأداء يجب أن تكون بين 0 و 100');
    if(!phone || phone.length < 10) return alert('أدخل رقم جوال صحيح');
    const newId = DB.teachers.length ? Math.max(...DB.teachers.map(t => t.id)) + 1 : 1;
    DB.teachers.push({ id: newId, name, perf, phone });
    localStorage.setItem('ANDALUS_FINAL_V1', JSON.stringify(DB));
    nav('TCH');
}

function deleteTeacher(id) {
    DB.teachers = DB.teachers.filter(t => t.id !== id);
    localStorage.setItem('ANDALUS_FINAL_V1', JSON.stringify(DB));
    nav('TCH');
}

function startup() { nav('IMP'); }
</script>
</body>
</html>
