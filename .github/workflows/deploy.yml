name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/fix-system-errors-EDe6q
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sync-to-main:
    if: github.ref == 'refs/heads/claude/fix-system-errors-EDe6q'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy changes to main and push
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions[bot]"
          git checkout main
          git checkout claude/fix-system-errors-EDe6q -- index.html
          git checkout claude/fix-system-errors-EDe6q -- .github/workflows/deploy.yml
          git add index.html .github/workflows/deploy.yml
          git diff --cached --quiet || git commit -m "chore: مزامنة التحديثات من فرع التطوير تلقائياً"
          git push origin main

  deploy:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
